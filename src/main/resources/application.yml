server:
  port: 3003

spring:
  application:
    name: asclepio-talk

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/asclepio?currentSchema=talk}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: talk
        format_sql: false
    show-sql: false

  flyway:
    schemas: talk
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:ASCLEPIO_ARSW-SECRET-2026-PROYECTO-HOSPITAL}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Daniel Useche
