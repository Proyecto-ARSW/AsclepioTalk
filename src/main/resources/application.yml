server:
  port: 3003
  # include-stacktrace=never evita exponer el stack al cliente HTTP
  # (seguridad); el stack sigue quedando en logs del servidor gracias al
  # log.error del GlobalExceptionHandler. include-message=always permite
  # al frontend mostrar el mensaje de errores 4xx legitimos.
  error:
    include-stacktrace: never
    include-message: always

spring:
  application:
    name: asclepio-talk

  # Excluimos FlywayAutoConfiguration para que Spring Boot ni siquiera registre
  # el bean de migracion. Asi, aunque Azure App Service defina por error
  # SPRING_FLYWAY_ENABLED=true en las Application settings, no hay autoconfig
  # que reactivar: las V1..V9 ya estan aplicadas a mano en la BD Azure y un
  # nuevo intento de Flyway rompe el arranque con "table already exists".
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/asclepio?currentSchema=talk}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: talk
        format_sql: false
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      # Limite logico de 10 MB en el service; aqui dejamos margen para que
      # el rechazo claro venga de la capa de negocio con i18n, no del servlet
      # con un error opaco.
      max-file-size: 12MB
      max-request-size: 15MB
      enabled: true

aws:
  s3:
    # Región donde está el bucket "asclepio-talk" en AWS.
    region: ${AWS_S3_REGION:us-east-1}
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    # Solo requerido con cuentas de AWS Academy / Learner Lab (credenciales STS
    # temporales). Con IAM permanente dejar vacío o no definir la variable.
    session-token: ${AWS_S3_SESSION_TOKEN:}
    # Alias del access point — el SDK lo trata como nombre de bucket normal;
    # el access point define que el origen sea Internet (no VPC-only), lo que
    # permite que las URLs presignadas sean accesibles desde cualquier browser.
    bucket: ${AWS_S3_BUCKET:asclepiotalk-855aimish7w8j79xuug7ogud44g3kuse1a-s3alias}
    # 10 minutos: tiempo suficiente para descargar/renderizar sin dejar la URL
    # viva eternamente. El cliente refresca al hacer otro GET de la conv.
    presigned-ttl-seconds: 600

jwt:
  secret: ${JWT_SECRET:ASCLEPIO_ARSW-SECRET-2026-PROYECTO-HOSPITAL}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Observabilidad: limitamos DEBUG a nuestro paquete para no inundar el log
# stream de Azure con ruido de Spring/Hibernate. Lettuce y Spring Data Redis
# se quedan en INFO porque ya escupen WARN/ERROR utiles cuando hay un fallo
# de SSL contra Azure Cache for Redis (puerto 6380).
logging:
  level:
    root: INFO
    arsw.asclepio.talk: DEBUG
    io.lettuce.core: INFO
    org.springframework.data.redis: INFO

